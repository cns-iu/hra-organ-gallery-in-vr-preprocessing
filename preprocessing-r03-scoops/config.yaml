# =============================================================================
# HRA 3D Cell Population Pipeline — Configuration
# =============================================================================
# Edit this file to control which organ is processed, how cells are placed,
# and what the output looks like. No code changes needed.

# ── Organ ─────────────────────────────────────────────────────────────────────
organ:
  name: heart                        # organ name used for HRApop filtering
  sex: female                          # female | male
  side:                         # left | right | leave blank for unpaired organs
  glb_filename:                       # leave blank to auto-resolve from name/sex/side

# ── API endpoints ─────────────────────────────────────────────────────────────
apis:
  reference_organs: https://apps.humanatlas.io/api--staging/v1/reference-organs
  hra_pop: https://apps.humanatlas.io/api/grlc/hra-pop/cell_types_in_anatomical_structurescts_per_as
  cell_generation: https://apps.humanatlas.io/api/v1/mesh-3d-cell-population

# ── Cell distribution filters ─────────────────────────────────────────────────
filters:
  tool: Azimuth                        
  modality: ""                         # leave blank for no filter

# ── Cell markers ──────────────────────────────────────────────────────────────
markers:
  num_nodes: 10000                     # total markers across ALL anatomical structures
  shape: sphere                        # sphere | cube | triangle
  sphere_radius: 0.00025
  sphere_subdivisions: 1
  size: null                           # overrides sphere_radius if set
  top_cell_type_count: 9               

# ── Visualization ─────────────────────────────────────────────────────────────
visualization:
  organ_alpha: 25                      # organ mesh transparency: 0 (invisible) – 255 (opaque)

# ── Output ────────────────────────────────────────────────────────────────────
output:
  organs_folder: Outputs/downloaded_organs
  amended_folder: Outputs/annotated_organs
  save_hra_pop_csv: false             # save raw HRApop API response as CSV
  save_cell_api_csv: false            # save raw 3D Cell API response as CSV



